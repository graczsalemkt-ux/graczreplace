                        {phase==='bounce' ? 'แตะกล่องเพื่อเปิดรางวัล!' : phase==='shaking' ? 'กำลังเปิด...' : '✨'}
                    </p>

            ) : (
                <div className="coupon-slide w-full max-w-xs">
                    <p className="text-yellow-300 text-center text-xs font-bold uppercase tracking-widest mb-3">🎊 คูปองของคุณ</p>
                    <div className="coupon-glow bg-white rounded-3xl overflow-hidden">
                        <div className="bg-[#2D5A27] px-6 py-5 text-center">
                            <p className="text-green-200 text-xs font-bold uppercase tracking-widest mb-1">Gracz Replace</p>
                            <p className="text-white text-3xl font-black">{coupon.title}</p>
                        </div>
                        <div className="flex items-center px-4 py-2">
                            <div className="flex-1 border-t-2 border-dashed border-slate-200"/>
                            <div className="mx-2 text-slate-300 text-xs">✂</div>
                            <div className="flex-1 border-t-2 border-dashed border-slate-200"/>

                        <div className="px-6 pb-5 text-center">
                            <p className="text-slate-600 text-sm font-bold mb-3 leading-relaxed">{coupon.desc}</p>
                            <div className="bg-slate-50 border-2 border-dashed border-[#2D5A27] rounded-xl py-2 px-4 mb-2">
                                <p className="text-[10px] text-slate-400 font-bold uppercase mb-0.5">โค้ดส่วนลด</p>
                                <p className="text-[#2D5A27] text-2xl font-black tracking-widest">{coupon.code}</p>

                            <p className="text-slate-400 text-[11px] font-bold">หมดอายุ: {coupon.exp}</p>
                        </div>
                    </div>
                    <div className="mt-4 space-y-2">
                        {/* แจ้งเตือนแคปหน้าจอ */}
                        <div className="bg-yellow-400 rounded-2xl px-4 py-3 text-center mb-1">
                            <p className="text-[#1a3a14] text-xs font-black leading-relaxed">📸 แคปหน้าจอส่งไลน์มาที่ <span className="underline">@gracz</span> เพื่อรับของรางวัลเลย!</p>
                        </div>
                        <p className="text-yellow-200 text-center text-xs font-bold uppercase tracking-widest mb-2">ชวนเพื่อนมาเล่น</p>
                        <div className="flex gap-2">
                            <button onClick={shareLine} className="flex-1 py-3 rounded-xl font-black text-white text-sm flex items-center justify-center gap-1.5" style={{background:'#06C755'}}>
                                <span style={{fontSize:'16px'}}>💬</span> LINE
                            </button>
                            <button onClick={shareFB} className="flex-1 py-3 rounded-xl font-black text-white text-sm flex items-center justify-center gap-1.5" style={{background:'#1877F2'}}>
                                <span style={{fontSize:'16px'}}>📘</span> Facebook
                            </button>
                            <button onClick={copyLink} className="flex-1 py-3 rounded-xl font-black text-white text-sm flex items-center justify-center gap-1.5" style={{background: copyDone?'#666':'#555'}}>
                                <span style={{fontSize:'16px'}}>{copyDone?'✅':'🔗'}</span> {copyDone?'แล้ว!':'Copy'}
                            </button>
                        </div>
                        <button onClick={onClose} className="w-full py-3 rounded-xl font-black text-[#2D5A27] bg-white text-sm mt-1">
                            กลับหน้าหลัก
                        </button>
                    </div>
                </div>
            )}
        </div>
    );
};

const playerTokens = [
    { name: 'ทีมเขียว',  color: 'bg-[#2D5A27]', hex: '#2D5A27' },
    { name: 'ทีมฟ้า',    color: 'bg-[#0288D1]', hex: '#0288D1' },
    { name: 'ทีมเหลือง', color: 'bg-[#FBC02D]', hex: '#FBC02D' },
    { name: 'ทีมแดง',    color: 'bg-[#D32F2F]', hex: '#D32F2F' },
    { name: 'ทีมม่วง',   color: 'bg-[#7B1FA2]', hex: '#7B1FA2' },
    { name: 'ทีมส้ม',    color: 'bg-[#E65100]', hex: '#E65100' },
];

// ── Components ──
const Icon = ({ name, size = 24, className = "" }) => {
    const icons = {
        leaf:   <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.5 21 2c-2.5 4-3 5.5-4.1 11.2A7 7 0 0 1 11 20z" />,
        trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6 M18 9h1.5a2.5 2.5 0 0 0 0-5H18 M4 22h16 M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22 M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22 M18 2H6v7a6 6 0 0 0 12 0V2z" />,
        copy:   <path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2M8 4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2M8 4h8" />,
        wifi:   <React.Fragment><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1"/></React.Fragment>,
    };
    return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {icons[name] || null}
        </svg>
    );
};

const Dice3D = ({ value, rolling }) => {
    const getRotation = (v) => {
        const map = { 1:"rotateX(0deg) rotateY(0deg)", 2:"rotateX(0deg) rotateY(-90deg)", 3:"rotateX(-90deg) rotateY(0deg)", 4:"rotateX(90deg) rotateY(0deg)", 5:"rotateX(0deg) rotateY(90deg)", 6:"rotateX(180deg) rotateY(0deg)" };
        return map[v] || map[1];
    };
    return (
        <div className="scene">
            <div className={`dice ${rolling ? 'rolling' : ''}`} style={{ transform: rolling ? '' : getRotation(value) }}>
                <div className="dice-face face-1"><div className="dot red col-start-2 row-start-2"></div></div>
                <div className="dice-face face-2"><div className="dot col-start-1 row-start-1"></div><div className="dot col-start-3 row-start-3"></div></div>
                <div className="dice-face face-3"><div className="dot col-start-1 row-start-1"></div><div className="dot col-start-2 row-start-2"></div><div className="dot col-start-3 row-start-3"></div></div>
                <div className="dice-face face-4"><div className="dot col-start-1 row-start-1"></div><div className="dot col-start-3 row-start-1"></div><div className="dot col-start-1 row-start-3"></div><div className="dot col-start-3 row-start-3"></div></div>
                <div className="dice-face face-5"><div className="dot col-start-1 row-start-1"></div><div className="dot col-start-3 row-start-1"></div><div className="dot col-start-2 row-start-2"></div><div className="dot col-start-1 row-start-3"></div><div className="dot col-start-3 row-start-3"></div></div>
                <div className="dice-face face-6"><div className="dot col-start-1 row-start-1"></div><div className="dot col-start-3 row-start-1"></div><div className="dot col-start-1 row-start-2"></div><div className="dot col-start-3 row-start-2"></div><div className="dot col-start-1 row-start-3"></div><div className="dot col-start-3 row-start-3"></div></div>
            </div>
        </div>
    );
};

const TileZoomModal = ({ tile, player, coord, tileIdx, onDone }) => {
    const [animClass, setAnimClass] = useState('tile-zoom-enter');
    useEffect(() => {
        const t1 = setTimeout(() => setAnimClass('tile-zoom-exit'), 2700);
        const t2 = setTimeout(() => onDone(), 3000);
        return () => { clearTimeout(t1); clearTimeout(t2); };
    }, []);
    const isFinish = tileIdx === boardTiles.length - 1;
    const imgSrc = tileImages[tileIdx] || tileImages[0];
    const sparklePositions = [
        { top:'-22px', left:'50%', transform:'translateX(-50%)' },
        { top:'50%',   right:'-22px', transform:'translateY(-50%)' },
        { bottom:'-22px', left:'50%', transform:'translateX(-50%)' },
        { top:'50%',   left:'-22px', transform:'translateY(-50%)' },
        { top:'-16px', left:'-16px' },
        { top:'-16px', right:'-16px' },
        { bottom:'-16px', left:'-16px' },
        { bottom:'-16px', right:'-16px' },
    ];
    return (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-6">
            <div className={`w-full max-w-xs ${animClass}`}>
                <div className="bg-[#2D5A27] text-white text-center py-2 px-4 rounded-t-2xl">
                    <p className="text-[10px] font-bold uppercase tracking-widest text-green-200">{player.name} เหยียบช่อง</p>
                    <p className="text-lg font-black">{tile.name}</p>
                </div>
                <div className={`relative w-full border-x-4 border-[#2D5A27] ${isFinish ? 'finish-glow' : ''}`} style={{ aspectRatio: '1/1', overflow: 'visible' }}>
                    {isFinish && sparklePositions.map((style, i) => (
                        <span key={i} className="sparkle-star" style={{ ...style, animationDelay:`${i*0.22}s` }}>✨</span>
                    ))}
                    <img src={imgSrc} alt={tile.name} className="w-full h-full object-contain bg-white" style={{ display:'block' }} />
                </div>
                <div className="bg-white text-center px-4 py-3 rounded-b-2xl border-x-4 border-b-4 border-[#2D5A27]">
                    <p className="text-sm font-bold text-slate-600 leading-snug">{tile.desc}</p>
                </div>
            </div>
        </div>
    );
};

// ── Main App ──
const App = () => {
    const [screen, setScreen] = useState('lobby');
    const [roomCode, setRoomCode] = useState('');
    const [joinInput, setJoinInput] = useState('');
    const [myIdx, setMyIdx] = useState(0);
    const [gameState, setGameState] = useState(null);
    const [isRolling, setIsRolling] = useState(false);
    const [lastRoll, setLastRoll] = useState(1);
    const [showTileZoom, setShowTileZoom] = useState(null);
    const [showEffectModal, setShowEffectModal] = useState(null);
    const [showInviteModal, setShowInviteModal] = useState(null); // ── ช่อง 22
    const [copied, setCopied] = useState(false);
    const [playerCount, setPlayerCount] = useState(2);
    const [fbReady, setFbReady] = useState(!!window._firebaseReady);
    const [isOffline, setIsOffline] = useState(false);
    const unsubRef = useRef(null);
    const offlineStateRef = useRef(null);

    // ── Offline helpers ──
    const startOfflineGame = () => {
        const players = Array.from({ length: playerCount }, (_, i) => ({
            id: i, name: playerTokens[i].name, pos: 0, skipTurns: 0, color: playerTokens[i].color, hex: playerTokens[i].hex
        }));
        const initState = {
            screen: 'game', players,
            currentPlayerIdx: 0, lastRoll: 1,
            logs: ["ยินดีต้อนรับสู่ Gracz! (Offline)"],
            winner: null, playerCount,
        };
        offlineStateRef.current = initState;
        setIsOffline(true);
        setMyIdx(0);
        setGameState(initState);
        setScreen('game');
    };

    useEffect(() => {
        waitForFirebase(() => setFbReady(true));
    }, []);

    // ── Listen to room ──
    useEffect(() => {
        if (!roomCode || !fbReady) return;
        if (unsubRef.current) unsubRef.current();
        unsubRef.current = dbOn(`rooms/${roomCode}`, (data) => {
            if (!data) return;
            setGameState(data);
            if (data.screen === 'game' && screen !== 'game') setScreen('game');
        });
        return () => { if (unsubRef.current) unsubRef.current(); };
    }, [roomCode, fbReady]);

    // ── Create room ──
    const createRoom = async () => {
        if (!fbReady) return;
        const code = randomCode();
        const players = Array.from({ length: playerCount }, (_, i) => ({
            id: i, name: playerTokens[i].name, pos: 0, skipTurns: 0, color: playerTokens[i].color, hex: playerTokens[i].hex
        }));
        await dbSet(`rooms/${code}`, {
            screen: 'waiting',
            players,
            currentPlayerIdx: 0,
            lastRoll: 1,
            logs: ["ยินดีต้อนรับสู่ Gracz!"],
            winner: null,
            playerCount,
        });
        setRoomCode(code);
        setMyIdx(0);
        setScreen('waiting');
    };

    // ── Join room ──
    const joinRoom = async () => {
        if (!fbReady || !joinInput) return;
        const code = joinInput.toUpperCase();
        const data = await dbGet(`rooms/${code}`);
        if (!data) { alert('ไม่พบห้องนี้ครับ'); return; }
        const joined = data.joinedCount || 1;
        if (joined >= data.playerCount) { alert('ห้องเต็มแล้วครับ'); return; }
        await dbUpd(`rooms/${code}`, { joinedCount: joined + 1 });
        setRoomCode(code);
        setMyIdx(joined);
        setScreen(data.screen === 'game' ? 'game' : 'waiting');
    };

    // ── Start game (host only) ──
    const startGame = async () => {
        await dbUpd(`rooms/${roomCode}`, { screen: 'game', joinedCount: gameState?.playerCount || playerCount });
    };

    const copyCode = () => {
        navigator.clipboard.writeText(roomCode).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
    };

    // ── Game logic ──
    const gs = gameState;
    const isMyTurn = gs && (isOffline ? true : gs.currentPlayerIdx === myIdx);

    const pushUpdate = (patch) => {
        if (isOffline) {
            const merged = { ...offlineStateRef.current, ...patch };
            offlineStateRef.current = merged;
            setGameState({ ...merged });
            return Promise.resolve();
        }
        return dbUpd(`rooms/${roomCode}`, patch);
    };

    const handleMove = (playerIdx, steps, isEffect = false, currentPlayers = null) => {
        const basePlayers = currentPlayers || gs.players;
        const newPlayers = basePlayers.map((p, i) => {
            if (i !== playerIdx) return p;
            let newPos = p.pos + steps;
            if (newPos >= boardTiles.length - 1) newPos = boardTiles.length - 1;
            if (newPos < 0) newPos = 0;
            return { ...p, pos: newPos };
        });
        pushUpdate({ players: newPlayers }).then(() => {
            if (!isEffect) {
                setTimeout(() => {
                    const pos = newPlayers[playerIdx].pos;
                    const tile = boardTiles[pos];
                    const coord = tileCoords[pos];
                    setShowTileZoom({
                        tile, player: newPlayers[playerIdx], coord, tileIdx: pos,
                        onDone: () => {
                            setShowTileZoom(null);
                            checkTileEffect(playerIdx, newPlayers);
                        }
                    });
                }, 1300);
            } else {
                setTimeout(() => {
                    const pos = newPlayers[playerIdx].pos;
                    const tile = boardTiles[pos];
                    const coord = tileCoords[pos];
                    setShowTileZoom({
                        tile, player: newPlayers[playerIdx], coord, tileIdx: pos,
                        onDone: () => {
                            setShowTileZoom(null);
                            moveToNextPlayer(newPlayers);
                        }
                    });
                }, 400);
            }
        });
    };

    const checkTileEffect = (playerIdx, players) => {
        const pList = players || gs.players;
        const pos = pList[playerIdx].pos;
        const tile = boardTiles[pos];

        if (pos === boardTiles.length - 1) {
            pushUpdate({ winner: pList[playerIdx].name });
            return;
        }

        if (tile.effect) {
            // ── ช่อง 22: ชวนเพื่อน ──
            if (tile.effect.invite) {
                // ย้ายตัวเองไป +1 ก่อน
                const selfMoved = pList.map((p, i) => {
                    if (i !== playerIdx) return p;
                    return { ...p, pos: Math.min(p.pos + 1, boardTiles.length - 1) };
                });
                pushUpdate({ players: selfMoved }).then(() => {
                    setShowInviteModal({
                        playerIdx,
                        players: selfMoved,
                        onSelect: (friendIdx) => {
                            setShowInviteModal(null);
                            // ขยับเพื่อนที่ถูกเลือก +1
                            const friendMoved = selfMoved.map((p, i) => {
                                if (i !== friendIdx) return p;
                                return { ...p, pos: Math.min(p.pos + 1, boardTiles.length - 1) };
                            });
                            pushUpdate({ players: friendMoved }).then(() => {
                                moveToNextPlayer(friendMoved);
                            });
                        }
                    });
                });
            // ── เดิน/ถอย ──
            } else if (tile.effect.move) {
                setShowEffectModal({
                    player: pList[playerIdx], tile,
                    onClose: () => {
                        setShowEffectModal(null);
                        handleMove(playerIdx, tile.effect.move, true, pList);
                    }
                });
            // ── หยุดตา ──
            } else if (tile.effect.skip) {
                setShowEffectModal({
                    player: pList[playerIdx], tile,
                    onClose: () => {
                        setShowEffectModal(null);
                        const np = pList.map((p, i) => i === playerIdx ? { ...p, skipTurns: tile.effect.skip } : p);
                        pushUpdate({ players: np });
                        moveToNextPlayer(np);
                    }
                });
            } else {
                moveToNextPlayer(pList);
            }
        } else {
            moveToNextPlayer(pList);
        }
    };

    const moveToNextPlayer = (players) => {
        const pList = players || gs.players;
        let next = (gs.currentPlayerIdx + 1) % pList.length;
        let newPlayers = [...pList];
        let newLogs = [...(gs.logs || [])];
        if (newPlayers[next].skipTurns > 0) {
            newLogs = [`${newPlayers[next].name} พักตา`, ...newLogs].slice(0, 5);
            newPlayers[next] = { ...newPlayers[next], skipTurns: newPlayers[next].skipTurns - 1 };
            next = (next + 1) % pList.length;
        }
        pushUpdate({ currentPlayerIdx: next, players: newPlayers, logs: newLogs });
    };

    const rollDice = () => {
        if (!isMyTurn || isRolling || showEffectModal || showTileZoom || showInviteModal || gs?.winner) return;
        const activeIdx = isOffline ? gs.currentPlayerIdx : myIdx;
        setIsRolling(true);
        const dice = Math.floor(Math.random() * 6) + 1;
        setTimeout(() => {
            setLastRoll(dice);
            setIsRolling(false);
            const newLogs = [`${gs.players[activeIdx].name} ทอยได้ ${dice}`, ...(gs.logs || [])].slice(0, 5);
            pushUpdate({ lastRoll: dice, logs: newLogs });
            handleMove(activeIdx, dice);
        }, 1000);
    };

    // ── Screens ──
    if (!fbReady) return (
        <div className="min-h-full flex items-center justify-center bg-[#f0f4f0]">
            <p className="text-[#2D5A27] font-black animate-pulse">กำลังเชื่อมต่อ Firebase...</p>
        </div>
    );

    // LOBBY
    if (screen === 'lobby') return (
        <div className="min-h-full flex items-center justify-center p-6" style={{ background: '#2D5A27' }}>
            <div className="bg-white rounded-[2.5rem] shadow-xl w-full max-w-sm text-center overflow-hidden">
                <img
                    src="https://drive.google.com/thumbnail?id=1PZ6akJuBT0L75oV5CNyxz7nSDRIq8Idt&sz=w800"
                    alt="Gracz Replace Logo"
                    className="w-full"
                    style={{ display: 'block' }}
                />
                <div className="p-8 pt-6">
                <div className="bg-slate-50 p-5 rounded-2xl mb-4">
                    <p className="text-xs font-bold text-slate-400 mb-3 uppercase">สร้างห้องใหม่</p>
                    <div className="flex justify-center gap-2 mb-3 flex-wrap">
                        {[2,3,4,5,6].map(n => (
                            <button key={n} onClick={() => setPlayerCount(n)}
                                className={`w-11 h-11 rounded-xl font-bold text-sm transition-all ${playerCount===n?'bg-[#2D5A27] text-white':'bg-white text-slate-400 border'}`}>
                                {n}
                            </button>
                        ))}
                    </div>
                    <div className="flex justify-center gap-1.5 mb-3">
                        {Array.from({ length: playerCount }, (_, i) => (
                            <div key={i} className="flex flex-col items-center gap-1">
                                <div className="w-5 h-5 rounded-full border-2 border-white shadow" style={{ background: playerTokens[i].hex }} />
                                <span className="text-[8px] text-slate-400 font-bold">{playerTokens[i].name.replace('ทีม','')}</span>
                            </div>
                        ))}
                    </div>
                    <button onClick={createRoom} className="w-full bg-[#2D5A27] text-white py-3 rounded-xl font-black text-base shadow">
                        สร้างห้อง ({playerCount} คน)
                    </button>
                    <button onClick={startOfflineGame} className="w-full mt-2 bg-amber-500 text-white py-3 rounded-xl font-black text-base shadow flex items-center justify-center gap-2">
                        <span>📵</span> เล่น Offline ({playerCount} คน)
                    </button>
                </div>
                <div className="bg-slate-50 p-5 rounded-2xl">
                    <p className="text-xs font-bold text-slate-400 mb-3 uppercase">เข้าร่วมห้อง</p>
                    <input
                        value={joinInput} onChange={e => setJoinInput(e.target.value.toUpperCase())}
                        placeholder="กรอก Room Code"
                        className="w-full border-2 border-slate-200 rounded-xl px-4 py-2 text-center font-black text-lg tracking-widest mb-3 focus:outline-none focus:border-[#2D5A27]"
                        maxLength={5}
                    />
                    <button onClick={joinRoom} disabled={!joinInput} className="w-full bg-[#0288D1] text-white py-3 rounded-xl font-black text-base shadow disabled:opacity-40">
                        เข้าห้อง
                    </button>
                </div>
                </div>
            </div>
        </div>
    );

    // WAITING ROOM
    if (screen === 'waiting') return (
        <div className="min-h-full flex items-center justify-center p-6 bg-[#f0f4f0]">
            <div className="bg-white p-8 rounded-[2.5rem] shadow-xl w-full max-w-sm text-center">
                <Icon name="wifi" size={48} className="text-[#2D5A27] mx-auto mb-4" />
                <h2 className="text-2xl font-black text-[#2D5A27] mb-2">รอผู้เล่น...</h2>
                <p className="text-slate-400 text-sm mb-6">แชร์ Room Code ให้เพื่อนครับ</p>
                <div className="bg-[#2D5A27] rounded-2xl p-4 mb-6">
                    <p className="text-green-300 text-xs font-bold mb-1">ROOM CODE</p>
                    <p className="text-white text-4xl font-black tracking-[0.3em]">{roomCode}</p>
                    <button onClick={copyCode} className="mt-2 flex items-center gap-1 mx-auto text-green-300 text-xs font-bold">
                        <Icon name="copy" size={12} /> {copied ? 'คัดลอกแล้ว!' : 'คัดลอก'}
                    </button>
                </div>
                <div className="space-y-2 mb-6">
                    {Array.from({ length: gs?.playerCount || playerCount }, (_, i) => (
                        <div key={i} className="flex items-center gap-3 px-4 py-2 rounded-xl bg-slate-50">
                            <div className="w-3 h-3 rounded-full" style={{ background: playerTokens[i].hex }} />
                            <span className="text-sm font-bold text-slate-600">{playerTokens[i].name}</span>
                            <span className="ml-auto text-xs text-slate-400">
                                {i === 0 ? '👑 Host' : i < (gs?.joinedCount || 1) ? '✅ เข้าร่วมแล้ว' : '⏳ รออยู่...'}
                            </span>
                        </div>
                    ))}
                </div>
                {myIdx === 0 ? (
                    <button onClick={startGame}
                        disabled={(gs?.joinedCount || 1) < (gs?.playerCount || playerCount)}
                        className="w-full bg-[#2D5A27] text-white py-4 rounded-2xl font-black text-lg shadow disabled:opacity-40">
                        {(gs?.joinedCount || 1) < (gs?.playerCount || playerCount) ? 'รอผู้เล่นเข้าร่วม...' : 'เริ่มเกม!'}
                    </button>
                ) : (
                    <p className="text-slate-400 font-bold animate-pulse">รอ Host เริ่มเกม...</p>
                )}
            </div>
        </div>
    );

    // GAME OVER
    const onBackToLobby = () => { setScreen('lobby'); setRoomCode(''); setGameState(null); setIsOffline(false); offlineStateRef.current = null; };
    if (gs?.winner) {
        const iAmWinner = isOffline
            ? true // offline ทุกคนเห็น TreasureBox
            : gs.players?.[myIdx]?.name === gs.winner;

        if (iAmWinner) return (
            <TreasureBox winner={gs.winner} onClose={onBackToLobby} />
        );

        // ── หน้าแพ้ ──
        const loserShareText = `🎮 มาเล่นเกม Gracz Replace กันเถอะ!\nเล่นสนุก ลุ้นของรางวัลสุดพิเศษกันได้เลย 🎁\nคลิกเล่นได้เลย: ${window.location.href}`;
        const loserShareLine = () => window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(loserShareText)}`,'_blank');
        const loserShareFB   = () => window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}&quote=${encodeURIComponent(loserShareText)}`,'_blank');

        return (
            <div className="fixed inset-0 flex flex-col items-center justify-center z-50 p-6 overflow-y-auto"
                style={{background:'linear-gradient(135deg,#1a3a14 0%,#2D5A27 100%)'}}>
                <div className="text-center w-full max-w-xs mx-auto">
                    <p className="text-6xl mb-3">😢</p>
                    <p className="text-yellow-300 text-sm font-bold tracking-widest uppercase mb-1">ผู้ชนะคือ</p>
                    <p className="text-white text-2xl font-black mb-4">🏆 {gs.winner}</p>

                    {/* ข้อความแพ้ */}
                    <div className="bg-white/10 rounded-3xl p-5 mb-5">
                        <p className="text-white text-base font-black leading-relaxed mb-1">เสียใจด้วยนะ 😔</p>
                        <p className="text-green-200 text-sm font-bold leading-relaxed">คุณฝีมือยังไม่ถึงในครั้งนี้...</p>
                    </div>

                    {/* ชวนเพื่อน */}
                    <div className="bg-yellow-400 rounded-2xl px-4 py-3 text-center mb-4">
                        <p className="text-[#1a3a14] text-xs font-black leading-relaxed">🎮 ชวนเพื่อนมาเล่นด้วยกัน รับของรางวัลสุดพิเศษ!</p>
                    </div>
                    <div className="flex gap-2 mb-3">
                        <button onClick={loserShareLine} className="flex-1 py-3 rounded-xl font-black text-white text-sm flex items-center justify-center gap-1.5" style={{background:'#06C755'}}>
                            <span style={{fontSize:'16px'}}>💬</span> LINE
                        </button>
                        <button onClick={loserShareFB} className="flex-1 py-3 rounded-xl font-black text-white text-sm flex items-center justify-center gap-1.5" style={{background:'#1877F2'}}>
                            <span style={{fontSize:'16px'}}>📘</span> Facebook
                        </button>
                    </div>
                    <button onClick={onBackToLobby}
                        className="w-full py-4 rounded-2xl font-black text-[#2D5A27] bg-white text-lg shadow-xl active:scale-95 transition-all">
                        กลับหน้าหลัก
                    </button>
                </div>
            </div>
        );
    }

    // GAME
    if (screen === 'game' && gs) {
        const players = gs.players || [];
        const currentPlayerIdx = gs.currentPlayerIdx || 0;
        const diceVal = gs.lastRoll || 1;
        const logs = gs.logs || [];
        const currentPlayer = players[currentPlayerIdx] || {};

        return (
            <div className="min-h-full flex flex-col bg-[#f0f4f0]">
                {/* Player bar */}
                <div className="flex justify-center gap-2 p-3 bg-white/80 sticky top-0 z-30 overflow-x-auto whitespace-nowrap border-b">
                    {players.map((p, i) => (
                        <div key={i} className={`flex items-center gap-2 px-3 py-1.5 rounded-full border-2 transition-all ${currentPlayerIdx===i?'border-[#2D5A27] bg-green-50 scale-105':'border-transparent opacity-50'}`}>
                            <div className="w-3 h-3 rounded-full" style={{ background: p.hex }} />
                            <span className="text-xs font-bold text-[#2D5A27]">{p.name}</span>
                            {i === myIdx && <span className="text-[9px] text-green-500 font-black">(ฉัน)</span>}
                        </div>
                    ))}
                </div>

                {/* Board */}
                <div className="relative w-full aspect-[4/3] bg-white p-1">
                    <img src={boardImage} alt="Board" className="w-full h-full object-contain" />
                    <div className="absolute inset-0">
                        {players.map((p, i) => {
                            const coords = tileCoords[p.pos] || { x: 0, y: 0 };
                            const offsets = [
                                { x: -1.5, y: -1.5 }, { x:  1.5, y: -1.5 },
                                { x: -1.5, y:  1.5 }, { x:  1.5, y:  1.5 },
                                { x:  0,   y: -3   }, { x:  0,   y:  3   },
                            ];
                            const offset = offsets[i] || { x: 0, y: 0 };
                            return (
                                <div key={i} className="absolute w-[4.5%] aspect-square rounded-full border-2 border-white shadow-lg transition-all duration-700 z-20 flex items-center justify-center text-[8px] text-white font-black"
                                    style={{ left:`${coords.x+offset.x}%`, top:`${coords.y+offset.y}%`, transform:'translate(-50%,-50%)', background: p.hex }}>
                                    {i+1}
                                </div>
                            );
                        })}
                    </div>
                </div>

                {/* Controls */}
                <div className="flex-1 p-4 flex flex-col items-center justify-between">
                    <div className="text-center w-full">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            ตาของ: <span style={{ color: currentPlayer.hex }}>{currentPlayer.name}</span>
                            {isMyTurn && <span className="text-green-500"> (ตาคุณ!)</span>}
                        </p>
                        <Dice3D value={diceVal} rolling={isRolling} />
                    </div>

                    <div className="w-full space-y-3">
                        <button onClick={rollDice}
                            disabled={!isMyTurn || isRolling || !!showEffectModal || !!showTileZoom || !!showInviteModal}
                            className={`w-full py-5 rounded-2xl font-black text-xl text-white shadow-xl active:scale-95 transition-all ${
                                !isMyTurn ? 'bg-slate-300' : isRolling ? 'bg-slate-300' : 'bg-[#2D5A27]'
                            }`}>
                            {isRolling ? 'กำลังทอย...' : isOffline ? `ทอยลูกเต๋า (${currentPlayer.name})` : isMyTurn ? 'ทอยลูกเต๋า' : `รอ ${currentPlayer.name}...`}
                        </button>

                        <div className="log-container p-4 rounded-2xl text-white min-h-[80px]">
                            <div className="text-[9px] uppercase font-bold text-green-300 mb-2">ประวัติการเล่น</div>
                            <div className="space-y-1">
                                {logs.map((log, i) => (
                                    <div key={i} className={`text-[11px] ${i===0?'opacity-100':'opacity-40'}`}>• {log}</div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>

                {/* TileZoom Modal */}
                {showTileZoom && (
                    <TileZoomModal tile={showTileZoom.tile} player={showTileZoom.player} coord={showTileZoom.coord} tileIdx={showTileZoom.tileIdx} onDone={showTileZoom.onDone} />
                )}

                {/* Effect Modal (move / skip) */}
                {showEffectModal && (
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-6">
                        <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-xs text-center border-t-[12px] border-[#2D5A27]">
                            <h2 className="text-xl font-black text-slate-800 mb-2">{showEffectModal.tile.name}</h2>
                            <p className="text-sm text-slate-500 mb-8 font-bold leading-relaxed">{showEffectModal.tile.desc}</p>
                            <button onClick={showEffectModal.onClose}
                                className="w-full py-4 rounded-xl font-black text-white"
                                style={{ background: showEffectModal.player.hex }}>ตกลง</button>
                        </div>
                    </div>
                )}

                {/* Invite Modal – ช่อง 22 ชวนเพื่อนใช้เกรซ */}
                {showInviteModal && (
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-6">
                        <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-xs text-center border-t-[12px] border-[#2D5A27]">
                            <p className="text-3xl mb-2">🤝</p>
                            <h2 className="text-lg font-black text-slate-800 mb-1">ชวนเพื่อนใช้เกรซ</h2>
                            <p className="text-sm text-slate-500 mb-5 font-bold leading-relaxed">
                                เลือก 1 คน เดินหน้าพร้อมคุณ 1 ช่อง
                            </p>
                            <div className="space-y-2">
                                {showInviteModal.players.map((p, i) => {
                                    if (i === showInviteModal.playerIdx) return null;
                                    return (
                                        <button key={i} onClick={() => showInviteModal.onSelect(i)}
                                            className="w-full py-3 rounded-xl font-black text-white flex items-center justify-center gap-3 text-sm active:scale-95 transition-all"
                                            style={{ background: p.hex }}>
                                            <span className="w-6 h-6 rounded-full bg-white/30 flex items-center justify-center text-xs font-black">{i+1}</span>
                                            {p.name}
                                            <span className="text-white/70 text-xs font-bold">(ช่องที่ {p.pos})</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    return null;
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
